<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <form>
    Name: <input type="text" name="name" id="name"> <br>
    Email: <input type="email" name="email" id="email"> <br>
    Gender:<br> <input type="radio" name="gender" id="male" value="male"> Male <br>
    <input type="radio" name="gender" id="female" value="female"> Female <br>
    Hobbies: <br><input type="checkbox" name="hobbies" id="reading" value="reading"> Reading <br>
    <input type="checkbox" name="hobbies" id="playing_games" value="playing_games"> Playing Games <br>
    <input type="checkbox" name="hobbies" id="swimming" value="swimming"> Swimming <br>
    Nationality: <select id="nationality" name="nationality"> <br>
        <option value="Saudi">Saudi</option> <br>
        <option value="Syria">Syria</option> <br>
        <option value="Other">Other</option> <br>
    </select> <br>
        Message: <br><textarea name="message" id="message" cols="30" rows="10"></textarea> <br>
    <input type="submit" value="Submit">
    </form>
</body>
</html>
